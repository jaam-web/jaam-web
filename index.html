
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizaciones en Vivo</title>
    <style>
        :root {
            --bg-primary: #0a0f1a;
            --bg-secondary: #111827;
            --bg-card: #1a2332;
            --text-primary: #e8edf5;
            --text-secondary: #8b95a5;
            --accent-green: #10b981;
            --accent-amber: #f59e0b;
            --border-color: #2a3544;
            --glow-green: rgba(16, 185, 129, 0.3);
            --glow-amber: rgba(245, 158, 11, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Fondo animado */
        .background-effects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, var(--accent-green), transparent);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, var(--accent-amber), transparent);
            bottom: -50px;
            right: -50px;
            animation-delay: -10s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #3b82f6, transparent);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 10px) scale(1.02); }
        }

        /* Grid de lineas sutiles */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(var(--border-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.15;
            z-index: 0;
        }

        /* Contenedor principal */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 600px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .timestamp {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 100px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* Cards de precios */
        .prices-grid {
            display: grid;
            gap: 20px;
        }

        .price-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 28px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
        }

        .price-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .price-card:hover {
            transform: translateY(-4px);
        }

        .price-card.dolar:hover {
            box-shadow: 0 20px 40px var(--glow-green);
        }

        .price-card.euro:hover {
            box-shadow: 0 20px 40px var(--glow-amber);
        }

        .card-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
        }

        .dolar .card-glow {
            background: linear-gradient(90deg, transparent, var(--accent-green), transparent);
        }

        .euro .card-glow {
            background: linear-gradient(90deg, transparent, var(--accent-amber), transparent);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .currency-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .currency-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .dolar .currency-icon {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-green);
        }

        .euro .currency-icon {
            background: rgba(245, 158, 11, 0.15);
            color: var(--accent-amber);
        }

        .currency-name {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .currency-label {
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 2px;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .dolar .badge {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-green);
        }

        .euro .badge {
            background: rgba(245, 158, 11, 0.15);
            color: var(--accent-amber);
        }

        .price-value {
            font-size: clamp(2rem, 8vw, 3rem);
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
        }

        .price-value::before {
            content: '$';
            font-size: 0.6em;
            vertical-align: top;
            margin-right: 4px;
            opacity: 0.6;
        }

        .price-decimals {
            opacity: 0.5;
        }

        /* Fecha info */
        .date-info {
            margin-top: 32px;
            text-align: center;
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            opacity: 0;
            transform: translateY(20px);
        }

        .date-info.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .date-text {
            font-size: 1.1rem;
            color: var(--text-primary);
        }

        .date-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Botón actualizar */
        .refresh-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
            padding: 14px 28px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .refresh-btn:hover {
            background: var(--bg-card);
            color: var(--text-primary);
            border-color: var(--accent-green);
        }

        .refresh-btn:active {
            transform: scale(0.98);
        }

        .refresh-btn.loading svg {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .refresh-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Estado de carga */
        .loading-state {
            text-align: center;
            padding: 60px 20px;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        .loading-text {
            color: var(--text-secondary);
        }

        /* Estado de error */
        .error-state {
            text-align: center;
            padding: 40px 20px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
        }

        .error-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .error-title {
            color: #ef4444;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .error-message {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .price-card {
                padding: 20px;
            }
            
            .currency-icon {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- Efectos de fondo -->
    <div class="background-effects">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>
    <div class="grid-overlay"></div>

    <!-- Contenido principal -->
    <div class="container">
        <header class="header">
            <h1>Cotizaciones en Vivo</h1>
            <div class="timestamp" id="timestamp">
                <span class="pulse-dot"></span>
                <span id="timeDisplay">Cargando...</span>
            </div>
        </header>

        <div id="content">
            <div class="loading-state">
                <div class="loader"></div>
                <p class="loading-text">Obteniendo cotizaciones...</p>
            </div>
        </div>

        <button class="refresh-btn" id="refreshBtn" onclick="fetchData()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            Actualizar cotizaciones
        </button>
    </div>

    <script>
        const API_URL = 'https://api-jaam-001-default-rtdb.firebaseio.com/precios.json?auth=UrMHAUgGG8qglWj7VPAY3wPNkGqQNEkKCqMrxI6v';
        const contentEl = document.getElementById('content');
        const timeDisplayEl = document.getElementById('timeDisplay');
        const refreshBtn = document.getElementById('refreshBtn');

        function formatPrice(value) {
            const num = parseFloat(value);
            const formatted = num.toFixed(2);
            const parts = formatted.split('.');
            return {
                integer: parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ','),
                decimals: parts[1]
            };
        }

        function renderData(data) {
            const dolarPrice = formatPrice(data.dolar);
            const euroPrice = formatPrice(data.euro);
            
            const timeString = `${data.hora} ${data.ampm}`;
            const dateString = `${data.dia_nombre} ${data.dia_num} de ${data.mes_nombre} de ${data.anio}`;
            
            timeDisplayEl.textContent = `Actualizado: ${timeString}`;

            contentEl.innerHTML = `
                <div class="prices-grid">
                    <div class="price-card dolar" id="cardDolar">
                        <div class="card-glow"></div>
                        <div class="card-header">
                            <div class="currency-info">
                                <div class="currency-icon">USD</div>
                                <div>
                                    <div class="currency-name">Moneda</div>
                                    <div class="currency-label">Dolar Estadounidense</div>
                                </div>
                            </div>
                            <span class="badge">Oficial</span>
                        </div>
                        <div class="price-value">
                            ${dolarPrice.integer}<span class="price-decimals">.${dolarPrice.decimals}</span>
                        </div>
                    </div>

                    <div class="price-card euro" id="cardEuro">
                        <div class="card-glow"></div>
                        <div class="card-header">
                            <div class="currency-info">
                                <div class="currency-icon">EUR</div>
                                <div>
                                    <div class="currency-name">Moneda</div>
                                    <div class="currency-label">Euro</div>
                                </div>
                            </div>
                            <span class="badge">Oficial</span>
                        </div>
                        <div class="price-value">
                            ${euroPrice.integer}<span class="price-decimals">.${euroPrice.decimals}</span>
                        </div>
                    </div>
                </div>

                <div class="date-info" id="dateInfo">
                    <div class="date-text">${dateString}</div>
                    <div class="date-label">Fecha de actualizacion</div>
                </div>
            `;

            // Animar entrada de cards
            setTimeout(() => {
                document.getElementById('cardDolar').classList.add('visible');
            }, 100);
            setTimeout(() => {
                document.getElementById('cardEuro').classList.add('visible');
            }, 200);
            setTimeout(() => {
                document.getElementById('dateInfo').classList.add('visible');
            }, 300);
        }

        function renderError(message) {
            contentEl.innerHTML = `
                <div class="error-state">
                    <div class="error-icon">⚠</div>
                    <div class="error-title">Error de conexion</div>
                    <div class="error-message">${message}</div>
                </div>
            `;
            timeDisplayEl.textContent = 'Sin conexion';
        }

        async function fetchData() {
            refreshBtn.classList.add('loading');
            contentEl.innerHTML = `
                <div class="loading-state">
                    <div class="loader"></div>
                    <p class="loading-text">Obteniendo cotizaciones...</p>
                </div>
            `;

            try {
                const response = await fetch(API_URL);
                
                if (!response.ok) {
                    throw new Error(`Error HTTP: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (!data) {
                    throw new Error('No se recibieron datos');
                }
                
                renderData(data);
            } catch (error) {
                console.error('Error fetching data:', error);
                renderError(error.message || 'No se pudo obtener la informacion. Intenta nuevamente.');
            } finally {
                refreshBtn.classList.remove('loading');
            }
        }

        // Cargar datos al iniciar
        fetchData();
    </script>
</body>
</html>
