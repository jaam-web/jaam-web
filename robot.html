<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asistente Inteligente 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #container { width: 100vw; height: 100vh; }
        
        #ui {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 30%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 20px;
            pointer-events: none;
        }
        
        #text-output {
            color: #fff;
            margin-bottom: 25px;
            font-size: 1.3rem;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            min-height: 3em;
            padding: 0 20px;
            font-weight: 300;
            letter-spacing: 0.5px;
            line-height: 1.4;
        }

        #mic-btn {
            pointer-events: auto;
            background: #000;
            border: 2px solid #00d2ff;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #mic-btn:hover { transform: scale(1.1); box-shadow: 0 0 30px rgba(0, 210, 255, 0.6); }
        #mic-btn.active { 
            background: rgba(255, 255, 255, 0.1); 
            border-color: #fff; 
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.7); }
            70% { box-shadow: 0 0 0 25px rgba(0, 210, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0); }
        }

        #status {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255,255,255,0.3);
            font-family: monospace;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        /* Indicador visual de animación */
        #action-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #00d2ff;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

    <div id="container"></div>
    <div id="status">Iniciando Sistemas...</div>
    <div id="action-indicator"></div>
    
    <div id="ui">
        <div id="text-output">Haz clic en el círculo para hablar.</div>
        <button id="mic-btn">
            <svg viewBox="0 0 24 24" width="30" height="30" fill="#00d2ff">
                <path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
            </svg>
        </button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // --- CONFIGURACIÓN DE ESCENA 3D ---
        const container = document.getElementById('container');
        const textOutput = document.getElementById('text-output');
        const statusDiv = document.getElementById('status');
        const actionIndicator = document.getElementById('action-indicator');
        const micBtn = document.getElementById('mic-btn');

        let scene, camera, renderer, model, mixer, clock;
        let actions = {}; 
        let currentAction = null;
        
        // Configuración de cámara para ver el ROSTRO (Plano medio)
        const cameraDistance = 9.8; // Más cerca
        const cameraHeight = 1.6;   // A la altura de los ojos

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);
            
            camera = new THREE.PerspectiveCamera(25, window.innerWidth / window.innerHeight, 0.1, 100); // FOV 25 para retrato
            camera.position.set(0, cameraHeight, cameraDistance);
            camera.lookAt(0, 1.4, 0); // Mirar ligeramente arriba del centro

            // Luces
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            // Luz frontal suave (Relleno)
            const fillLight = new THREE.DirectionalLight(0xffffff, 0.8);
            fillLight.position.set(0, 2, 4); 
            scene.add(fillLight);

            // Luz clave (Lateral dramática)
            const keyLight = new THREE.DirectionalLight(0x00d2ff, 0.6);
            keyLight.position.set(-5, 3, 2);
            scene.add(keyLight);

            // Contraluz (Separación)
            const backLight = new THREE.DirectionalLight(0xff0066, 0.4);
            backLight.position.set(5, 3, -2);
            scene.add(backLight);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            const loader = new THREE.GLTFLoader();
            
            loader.load('https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb', function (gltf) {
                
                model = gltf.scene;
                model.scale.set(0.75, 0.75, 0.75);
                model.position.y = -0.3; // Bajar un poco el modelo
                scene.add(model);

                mixer = new THREE.AnimationMixer(model);
                
                gltf.animations.forEach((clip) => {
                    actions[clip.name.toLowerCase()] = mixer.clipAction(clip);
                });

                // Iniciar en Idle
                if(actions.idle) {
                    actions.idle.play();
                    currentAction = actions.idle;
                }
                
                statusDiv.innerText = "Online";
                setTimeout(() => statusDiv.style.opacity = "0", 2000);
            });

            clock = new THREE.Clock();
            animate();
        }

        function fadeToAction(name, duration = 0.2, loop = THREE.LoopOnce) {
            // Normalizar nombre
            const actionKey = name.toLowerCase();
            if (!actions[actionKey] || currentAction === actions[actionKey]) return;

            const newAction = actions[actionKey];
            
            newAction.loop = loop;
            newAction.clampWhenFinished = (loop === THREE.LoopOnce);
            newAction.reset();
            newAction.fadeIn(duration);
            newAction.play();

            if (currentAction) currentAction.fadeOut(duration);
            currentAction = newAction;

            if (loop === THREE.LoopOnce) {
                const returnTime = newAction.getClip().duration * 1000;
                setTimeout(() => fadeToAction('idle', 0.5), returnTime + 200);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            renderer.render(scene, camera);
        }

        init();

        // --- CEREBRO "INTELIGENTE" MEJORADO ---
        
        function getRandomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function getSmartResponse(text) {
            text = text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

            // 1. ACCIONES FÍSICAS
            if (text.includes("hola") || text.includes("buenas") || text.includes("saludos")) {
                return { text: getRandomItem(["¡Hola! Me alegra verte.", "Saludos, humano. ¿Qué necesitas?", "Hola, estoy listo para ayudarte."]), action: "wave" };
            }
            if (text.includes("si") || text.includes("claro") || text.includes("afirmativo")) {
                return { text: getRandomItem(["Entendido.", "Procedo inmediatamente.", "Confirmado."]), action: "thumbsup" }; // Usamos thumbsup o yes
            }
            if (text.includes("no") || text.includes("negativo")) {
                return { text: getRandomItem(["Cancelado.", "De acuerdo, no haré nada.", "Entendido, deteniendo proceso."]), action: "no" };
            }
            if (text.includes("baila") || text.includes("musica") || text.includes("fiesta")) {
                return { text: "¡Activando protocolo de baile!", action: "dance" };
            }
            if (text.includes("chiste")) {
                const jokes = [
                    "¿Qué le dice un jaguar a otro? Jaguar you!",
                    "¿Por qué el libro de matemáticas está triste? Porque tiene muchos problemas.",
                    "¿Qué hace una abeja en el gimnasio? ¡Zum-ba!"
                ];
                return { text: jokes[Math.floor(Math.random() * jokes.length)], action: "wave" }; // Reir usamos wave como gesto
            }

            // 2. INFORMACIÓN Y ESTADO
            if (text.includes("hora")) {
                const now = new Date();
                return { text: `Son las ${now.getHours()} horas y ${now.getMinutes()} minutos.`, action: null };
            }
            if (text.includes("fecha") || text.includes("dia es")) {
                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                return { text: `Hoy es ${new Date().toLocaleDateString('es-ES', options)}.`, action: null };
            }
            if (text.includes("quien eres") || text.includes("tu nombre")) {
                return { text: "Soy tu asistente virtual versión 3.0. Fui diseñado para ayudarte aun estoy en proseso de desarrollo.", action: "thumbsup" };
            }
            if (text.includes("como estas") || text.includes("como te va")) {
                return { text: getRandomItem(["Mis sistemas funcionan al 100%.", "Estable y listo para servir.", "Sintiéndome muy digital hoy."]), action: "yes" };
            }

            // 3. MATEMÁTICAS BÁSICAS
            // Busca patrones "X más/menos/por/entre Y"
            const mathMatch = text.match(/(\d+)\s*(m[aá]s|menos|por|entre)\s*(\d+)/);
            if (mathMatch) {
                let n1 = parseFloat(mathMatch[1]);
                let op = mathMatch[2];
                let n2 = parseFloat(mathMatch[3]);
                let result;
                if (op.includes("más")) result = n1 + n2;
                if (op.includes("menos")) result = n1 - n2;
                if (op.includes("por")) result = n1 * n2;
                if (op.includes("entre")) result = n1 / n2;
                
                if (result !== undefined) {
                    return { text: `El resultado es ${result}.`, action: "thumbsup" };
                }
            }

            // 4. RESPUESTA POR DEFECTO INTELIGENTE
            const fallbacks = [
                "No tengo datos sobre eso. ¿Podrías preguntarme otra cosa?",
                "Interesante, pero no está en mi base de datos offline.",
                "Solo puedo responder preguntas sencillas. Intenta decir 'Hola' o 'Baila'.",
                "Mis sistemas no reconocen ese comando."
            ];
            return { text: getRandomItem(fallbacks), action: "no" };
        }

        // --- SISTEMA DE VOZ ---
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                micBtn.classList.add('active');
                textOutput.innerText = "Escuchando...";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                const response = getSmartResponse(transcript);
                
                // Mostrar respuesta y ejecutar
                textOutput.innerText = response.text;
                if(response.action) fadeToAction(response.action);
                
                // Hablar
                speak(response.text);
            };

            recognition.onerror = (event) => {
                micBtn.classList.remove('active');
                textOutput.innerText = "No escuché claramente. Intenta de nuevo.";
            };

            recognition.onend = () => {
                micBtn.classList.remove('active');
            };

            micBtn.addEventListener('click', () => {
                window.speechSynthesis.cancel();
                recognition.start();
            });

        } else {
            textOutput.innerText = "Tu navegador no soporta voz.";
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'es-ES';
            utterance.rate = 1.0; // Velocidad normal
            utterance.pitch = 1.0;
            
            // Intentar voz local de calidad
            const voices = window.speechSynthesis.getVoices();
            const spanishVoice = voices.find(v => v.lang.includes('es') && v.localService);
            if (spanishVoice) utterance.voice = spanishVoice;

            window.speechSynthesis.speak(utterance);
        }

        window.speechSynthesis.getVoices();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
