<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reloj Simbólico Alquímico</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        #reloj-container {
            position: relative;
            width: 350px;
            height: 350px;
            border: 4px solid #2c3e50;
            border-radius: 50%;
            margin: 20px;
            background: radial-gradient(circle, #1a1a1a, #000000);
            box-shadow: 0 0 40px rgba(0, 255, 150, 0.1);
        }

        .simbolo {
            position: absolute;
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 32px;
            line-height: 50px;
            color: #ecf0f1;
        }

        /* Aguja Unidades (Grande) */
        #aguja-grande {
            position: absolute;
            width: 4px;
            height: 125px;
            background: #ff5e57;
            bottom: 50%;
            left: calc(50% - 2px);
            transform-origin: bottom center;
            z-index: 10;
            border-radius: 2px;
        }

        /* Aguja "Pentas" (Pequeña) */
        #aguja-pequena {
            position: absolute;
            width: 8px;
            height: 80px;
            background: #00d8d6;
            bottom: 50%;
            left: calc(50% - 4px);
            transform-origin: bottom center;
            z-index: 5;
            border-radius: 4px;
        }

        .eje-central {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            top: calc(50% - 8px);
            left: calc(50% - 8px);
            z-index: 20;
            box-shadow: 0 0 10px white;
        }

        .controles {
            background: #1e1e1e;
            padding: 25px;
            border-radius: 20px;
            border: 1px solid #333;
            text-align: center;
        }

        select {
            font-size: 24px;
            padding: 8px;
            background: #2d3436;
            color: white;
            border: 1px solid #00d8d6;
            border-radius: 10px;
            margin: 5px;
            cursor: pointer;
        }

        button {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            background: #00d8d6;
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #05c46b;
            box-shadow: 0 0 15px #05c46b;
        }

        #display-resultado {
            margin-top: 25px;
            font-size: 4em;
            letter-spacing: 20px;
            color: #00d8d6;
            text-shadow: 0 0 20px rgba(0, 216, 214, 0.5);
            padding-left: 20px; /* Para compensar el letter-spacing */
        }
    </style>
</head>
<body>

    <div id="reloj-container">
        <div id="aguja-pequena"></div>
        <div id="aguja-grande"></div>
        <div class="eje-central"></div>
    </div>

    <div class="controles">
        <select id="v1">
            <option value="0">▽</option>
            <option value="1">△</option>
            <option value="2">□</option>
            <option value="3">○</option>
            <option value="4">☆</option>
        </select>
        
        <select id="operacion" style="border-color: #ff5e57;">
            <option value="suma">+</option>
            <option value="mult">×</option>
        </select>

        <select id="v2">
            <option value="0">▽</option>
            <option value="1">△</option>
            <option value="2">□</option>
            <option value="3">○</option>
            <option value="4">☆</option>
        </select>

        <button onclick="ejecutar()">Calcular</button>
    </div>

    <div id="display-resultado">▽▽</div>

    <script>
        const simbolos = ["▽", "△", "□", "○", "☆"];
        const agujaG = document.getElementById('aguja-grande');
        const agujaP = document.getElementById('aguja-pequena');
        const container = document.getElementById('reloj-container');

        // Renderizado del Reloj
        simbolos.forEach((sim, i) => {
            const div = document.createElement('div');
            div.className = 'simbolo';
            div.innerText = sim;
            const rad = i * 72 * (Math.PI / 180);
            const x = 150 + 130 * Math.sin(rad);
            const y = 150 - 130 * Math.cos(rad);
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            container.appendChild(div);
        });

        function ejecutar() {
            const n1 = parseInt(document.getElementById('v1').value);
            const n2 = parseInt(document.getElementById('v2').value);
            const op = document.getElementById('operacion').value;
            
            let total;
            if (op === "suma") {
                total = n1 + n2;
            } else {
                total = n1 * n2;
            }

            const decena = Math.floor(total / 5);
            const unidad = total % 5;

            // RESET: Vuelta al neutro instantánea
            agujaG.style.transition = "none";
            agujaP.style.transition = "none";
            agujaG.style.transform = "rotate(0deg)";
            agujaP.style.transform = "rotate(0deg)";
            
            // Forzar actualización del DOM
            void agujaG.offsetWidth;

            // ANIMACIÓN DE GIRO
            setTimeout(() => {
                const duracion = "1.5s cubic-bezier(0.25, 0.1, 0.25, 1)";
                agujaG.style.transition = "transform " + duracion;
                agujaP.style.transition = "transform " + duracion;

                // Giro de aguja grande (unidades acumuladas)
                agujaG.style.transform = `rotate(${total * 72}deg)`;
                
                // Giro de aguja pequeña (representa el primer dígito del resultado)
                agujaP.style.transform = `rotate(${decena * 72}deg)`;

                // Actualizar resultado visual
                document.getElementById('display-resultado').innerText = 
                    simbolos[decena] + simbolos[unidad];
            }, 50);
        }
    </script>
</body>
</html>
