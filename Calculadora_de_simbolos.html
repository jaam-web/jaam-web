<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloj Simbólico Maestro - Responsivo</title>
    <style>
        :root {
            --primary: #00d8d6;
            --secondary: #ff5e57;
            --bg: #0d0d0d;
            --panel: #1e1e1e;
            /* Tamaño base del reloj que escalará */
            --reloj-size: min(80vw, 400px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 10px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header-info {
            text-align: center;
            margin: 15px 0;
        }

        .config-panel {
            background: var(--panel);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            width: 95%;
            max-width: 500px;
        }

        @media (min-width: 600px) {
            .config-panel {
                flex-direction: row;
                justify-content: center;
            }
        }

        #reloj-container {
            position: relative;
            width: var(--reloj-size);
            height: var(--reloj-size);
            border: 6px solid #2c3e50;
            border-radius: 50%;
            margin: 20px auto;
            background: radial-gradient(circle, #1a1a1a, #000000);
            box-shadow: 0 0 40px rgba(0, 216, 214, 0.2);
        }

        .simbolo {
            position: absolute;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(18px, 5vw, 28px);
            color: #ecf0f1;
            transform: translate(-50%, -50%);
        }

        /* Agujas */
        .aguja {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 4px;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #aguja-grande {
            width: 4px;
            height: 40%;
            background: var(--secondary);
            z-index: 10;
        }

        #aguja-pequena {
            width: 8px;
            height: 25%;
            background: var(--primary);
            z-index: 5;
        }

        .eje-central {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            box-shadow: 0 0 10px white;
        }

        .controles {
            background: var(--panel);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #333;
            width: 95%;
            max-width: 500px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 10px;
            align-items: center;
        }

        select, input {
            width: 100%;
            font-size: 18px;
            padding: 12px 5px;
            background: #2d3436;
            color: white;
            border: 2px solid var(--primary);
            border-radius: 10px;
            text-align: center;
        }

        .btn-calcular {
            grid-column: span 3;
            margin-top: 10px;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
        }

        .btn-calcular:active {
            transform: scale(0.95);
            background: #05c46b;
        }

        #display-resultado {
            margin: 20px 0;
            font-size: clamp(3em, 15vw, 5em);
            color: var(--primary);
            text-shadow: 0 0 15px rgba(0, 216, 214, 0.4);
            font-family: serif;
        }

        label {
            font-size: 14px;
            color: var(--primary);
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="header-info">
        <h2>Transmutador Alquímico</h2>
    </div>

    <div class="config-panel">
        <label>Símbolos en el Reloj:</label>
        <input type="number" id="base-input" value="5" min="2" max="12" onchange="inicializarReloj()">
    </div>

    <div id="reloj-container">
        <div id="aguja-pequena" class="aguja"></div>
        <div id="aguja-grande" class="aguja"></div>
        <div class="eje-central"></div>
    </div>

    <div class="controles">
        <select id="v1"></select>
        
        <select id="operacion" style="border-color: var(--secondary);">
            <option value="suma">+</option>
            <option value="mult">×</option>
            <option value="resta">-</option>
            <option value="div">÷</option>
        </select>

        <select id="v2"></select>

        <button class="btn-calcular" onclick="ejecutar()">Calcular Destino</button>
    </div>

    <div id="display-resultado">--</div>

    <script>
        const bibliotecaSimbolos = ["▽", "△", "□", "○", "☆", "☽", "☉", "☿", "♀", "♂", "♃", "♄"];
        let simbolosActuales = [];
        
        const agujaG = document.getElementById('aguja-grande');
        const agujaP = document.getElementById('aguja-pequena');
        const container = document.getElementById('reloj-container');

        function inicializarReloj() {
            const base = parseInt(document.getElementById('base-input').value) || 5;
            // Limitar base
            const baseFinal = Math.min(Math.max(base, 2), 12);
            document.getElementById('base-input').value = baseFinal;
            
            simbolosActuales = bibliotecaSimbolos.slice(0, baseFinal);
            
            // Limpiar símbolos previos
            document.querySelectorAll('.simbolo').forEach(s => s.remove());
            
            // Renderizado circular dinámico
            const radio = (container.offsetWidth / 2) - 30; // Margen interno
            const centro = container.offsetWidth / 2;

            simbolosActuales.forEach((sim, i) => {
                const div = document.createElement('div');
                div.className = 'simbolo';
                div.innerText = sim;
                
                // Ángulo en radianes (empezando desde arriba)
                const angulo = (i * (360 / baseFinal)) * (Math.PI / 180);
                
                const x = centro + radio * Math.sin(angulo);
                const y = centro - radio * Math.cos(angulo);
                
                div.style.left = `${x}px`;
                div.style.top = `${y}px`;
                container.appendChild(div);
            });

            actualizarSelectores();
        }

        function actualizarSelectores() {
            const s1 = document.getElementById('v1');
            const s2 = document.getElementById('v2');
            s1.innerHTML = "";
            s2.innerHTML = "";
            
            simbolosActuales.forEach((sim, i) => {
                let opt = `<option value="${i}">${sim}</option>`;
                s1.innerHTML += opt;
                s2.innerHTML += opt;
            });
        }

        function ejecutar() {
            const n1 = parseInt(document.getElementById('v1').value);
            const n2 = parseInt(document.getElementById('v2').value);
            const op = document.getElementById('operacion').value;
            const base = simbolosActuales.length;
            
            let total;
            switch(op) {
                case "suma": total = n1 + n2; break;
                case "mult": total = n1 * n2; break;
                case "resta": total = n1 - n2; break;
                case "div": total = n2 !== 0 ? Math.floor(n1 / n2) : 0; break;
            }

            // Los resultados negativos se muestran como 0 en el reloj para esta lógica
            const totalReloj = total < 0 ? 0 : total;
            
            const decena = Math.floor(totalReloj / base);
            const unidad = totalReloj % base;

            const gradosPorUnidad = 360 / base;
            
            // Animación de las agujas
            agujaG.style.transform = `rotate(${totalReloj * gradosPorUnidad}deg)`;
            agujaP.style.transform = `rotate(${decena * gradosPorUnidad}deg)`;

            // Display del resultado
            if (total < 0) {
                document.getElementById('display-resultado').innerText = "Ø";
            } else {
                // Si la decena supera la base, ponemos un indicador de exceso (+)
                const charDecena = decena < base ? simbolosActuales[decena] : "∞";
                document.getElementById('display-resultado').innerText = charDecena + simbolosActuales[unidad];
            }
        }

        // Manejar cambio de tamaño de ventana para reposicionar símbolos
        window.addEventListener('resize', inicializarReloj);
        
        // Inicio
        window.onload = inicializarReloj;
    </script>
</body>
</html>
